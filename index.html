<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>타임싱크 — 대학생 일정 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAFC;
      --surface: #FFFFFF;
      --surface2: #F4F4F8;
      --primary: #5B5FDE;
      --primary-dark: #4549C7;
      --primary-light: #E8E9FC;
      --class: #5B5FDE;
      --class-light: #E8E9FC;
      --part: #F49B5C;
      --part-light: #FDEFE0;
      --event: #4FAE7F;
      --event-light: #E0F1E8;
      --free: #4FAE7F;
      --busy: #E15454;
      --text: #1A1A1F;
      --text2: #6B6B7B;
      --text3: #A8A8B5;
      --border: #E8E8EE;
      --danger: #E15454;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(40,40,80,0.06);
      --shadow-lg: 0 8px 32px rgba(40,40,80,0.12);
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── 공통 ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 12px 20px; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; border: none; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:active { background: var(--primary-dark); transform: scale(.97); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1.5px solid var(--border); }
    .btn-ghost:active { background: var(--surface2); }
    .btn-danger { background: #FEE; color: var(--danger); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 8px 14px; font-size: 13px; }

    /* ── 헤더 ── */
    #app-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #app-header .logo {
      font-size: 20px; font-weight: 700; color: var(--primary);
      letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px;
    }
    #app-header .logo-icon {
      width: 28px; height: 28px; background: var(--primary); color: #fff;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    #greeting { font-size: 13px; color: var(--text3); }

    /* ── 탭 ── */
    #tab-bar {
      background: var(--surface);
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tab-btn {
      flex: 1; min-width: 80px; padding: 12px 8px; font-family: inherit; font-size: 13px; font-weight: 500;
      background: none; border: none; cursor: pointer; color: var(--text3);
      border-bottom: 2.5px solid transparent; transition: all .15s; white-space: nowrap;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    /* ── 메인 ── */
    #main { padding: 16px; padding-bottom: 100px; }
    .page { display: none; }
    .page.active { display: block; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin: 18px 0 10px; }
    .section-title:first-child { margin-top: 0; }

    /* ── 홈 카드 ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow);
    }
    .stat-card .stat-icon { font-size: 18px; margin-bottom: 6px; }
    .stat-card .stat-val { font-size: 22px; font-weight: 700; }
    .stat-card .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .stat-card.classes .stat-val { color: var(--class); }
    .stat-card.part .stat-val { color: var(--part); }
    .stat-card.events .stat-val { color: var(--event); }
    .stat-card.free .stat-val { color: var(--free); }

    .today-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .today-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .today-card-title { font-size: 15px; font-weight: 700; }
    .today-card-date { font-size: 12px; color: var(--text3); }
    .today-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: 8px; margin-bottom: 6px;
      background: var(--surface2);
    }
    .today-item:last-child { margin-bottom: 0; }
    .today-item-time { font-size: 13px; font-weight: 700; color: var(--text); min-width: 50px; }
    .today-item-tag {
      display: inline-block; width: 4px; height: 24px; border-radius: 2px;
    }
    .today-item.class .today-item-tag { background: var(--class); }
    .today-item.part .today-item-tag { background: var(--part); }
    .today-item.event .today-item-tag { background: var(--event); }
    .today-item-info { flex: 1; }
    .today-item-name { font-size: 14px; font-weight: 500; }
    .today-item-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .empty { padding: 24px 12px; text-align: center; color: var(--text3); font-size: 13px; }

    /* ── 시간표 그리드 ── */
    #timetable-wrap { background: var(--surface); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); overflow-x: auto; }
    .timetable {
      display: grid;
      grid-template-columns: 32px repeat(5, 1fr);
      gap: 2px;
      font-size: 11px;
      min-width: 100%;
    }
    .timetable.with-sat { grid-template-columns: 32px repeat(6, 1fr); }
    .timetable.with-sun { grid-template-columns: 32px repeat(7, 1fr); }
    .tt-cell {
      background: var(--surface2); padding: 4px;
      min-height: 36px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; cursor: pointer; overflow: hidden;
    }
    .tt-header { background: transparent; font-weight: 700; color: var(--text2); min-height: 24px; }
    .tt-time { background: transparent; color: var(--text3); font-size: 10px; min-height: 36px; }
    .tt-cell.has-class { background: var(--class); color: #fff; font-weight: 500; }
    .tt-cell.has-part { background: var(--part); color: #fff; font-weight: 500; }
    .tt-cell.has-class small, .tt-cell.has-part small { font-size: 9px; font-weight: 400; opacity: .9; display: block; }

    /* ── 폼 ── */
    .form-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .form-row { margin-bottom: 12px; }
    .form-row:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
      outline: none; background: var(--surface);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); }
    .form-textarea { resize: none; min-height: 60px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .day-pick { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-pick-btn {
      padding: 8px 0; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface); font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .day-pick-btn.selected { background: var(--primary); border-color: var(--primary); color: #fff; }
    .period-pick { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .period-pick-btn {
      padding: 8px 0; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface); font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .period-pick-btn.selected { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── 리스트 ── */
    .item-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow); margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .item-tag { width: 4px; min-height: 36px; border-radius: 2px; flex-shrink: 0; }
    .item-tag.class { background: var(--class); }
    .item-tag.part { background: var(--part); }
    .item-tag.event { background: var(--event); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 500; }
    .item-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .item-del {
      background: none; border: none; cursor: pointer; color: var(--text3);
      font-size: 18px; padding: 4px 8px;
    }
    .item-del:hover { color: var(--danger); }

    /* ── 캘린더 ── */
    #cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    #cal-nav button { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 20px; padding: 6px 12px; border-radius: 6px; }
    #cal-nav button:hover { background: var(--surface2); }
    #cal-month { font-size: 17px; font-weight: 700; }
    .cal-grid { background: var(--surface); border-radius: var(--radius); padding: 10px; box-shadow: var(--shadow); }
    .cal-week-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
    .cal-week-header div { text-align: center; font-size: 11px; font-weight: 700; color: var(--text2); padding: 6px 0; }
    .cal-week-header div.sun { color: var(--danger); }
    .cal-week-header div.sat { color: var(--primary); }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day {
      aspect-ratio: 1; padding: 4px; border-radius: 6px;
      cursor: pointer; position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .cal-day:hover { background: var(--surface2); }
    .cal-day.other-month { color: var(--text3); }
    .cal-day.today { background: var(--primary-light); color: var(--primary); font-weight: 700; }
    .cal-day.selected { background: var(--primary); color: #fff; }
    .cal-day-num { font-size: 12px; font-weight: 500; }
    .cal-day-dots { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center; min-height: 6px;}
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
    .cal-dot.class { background: var(--class); }
    .cal-dot.part { background: var(--part); }
    .cal-dot.event { background: var(--event); }
    #cal-day-detail {
      margin-top: 14px; background: var(--surface); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow);
    }
    #cal-detail-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }

    /* ── 빈 시간 찾기 ── */
    .free-day-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow); margin-bottom: 8px;
    }
    .free-day-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .free-slot {
      display: inline-block; background: var(--event-light); color: var(--event);
      padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 700;
      margin: 3px 3px 0 0;
    }

    /* ── FAB ── */
    #fab {
      position: fixed; bottom: 24px; right: calc(50% - 215px + 16px);
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--primary); color: #fff;
      font-size: 28px; border: none; cursor: pointer;
      box-shadow: var(--shadow-lg); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    #fab:active { transform: scale(.92); }

    /* ── 토스트 ── */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: #fff; padding: 10px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none;
      transition: all .25s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 모달 ── */
    #modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: none; align-items: flex-end; justify-content: center; z-index: 500;
    }
    #modal-bg.show { display: flex; }
    #modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 430px; max-height: 85vh; overflow-y: auto;
      padding: 20px; animation: slideUp .25s;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    #modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }

    @media (max-width: 430px) {
      #fab { right: 16px; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>

<header id="app-header">
  <div class="logo">
    <div class="logo-icon">⏱</div>
    <span>타임싱크</span>
  </div>
  <div id="greeting">대학생 일정 관리</div>
</header>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="home">홈</button>
  <button class="tab-btn" data-tab="timetable">시간표</button>
  <button class="tab-btn" data-tab="parttime">알바</button>
  <button class="tab-btn" data-tab="calendar">캘린더</button>
  <button class="tab-btn" data-tab="freetime">빈 시간</button>
</div>

<main id="main">

  <div id="home-page" class="page active">
    <div class="stat-grid">
      <div class="stat-card classes"><div class="stat-icon">📚</div><div class="stat-val" id="stat-classes">0</div><div class="stat-label">수업 (주간)</div></div>
      <div class="stat-card part"><div class="stat-icon">💼</div><div class="stat-val" id="stat-part">0</div><div class="stat-label">알바 (주간)</div></div>
      <div class="stat-card events"><div class="stat-icon">📌</div><div class="stat-val" id="stat-events">0</div><div class="stat-label">예정된 약속</div></div>
      <div class="stat-card free"><div class="stat-icon">🕊</div><div class="stat-val" id="stat-free">0</div><div class="stat-label">오늘 공강 (교시)</div></div>
    </div>

    <div class="today-card">
      <div class="today-card-header">
        <div class="today-card-title">📅 오늘의 일정</div>
        <div class="today-card-date" id="today-date"></div>
      </div>
      <div id="today-list"></div>
    </div>

    <div class="today-card">
      <div class="today-card-header">
        <div class="today-card-title">🔜 다가오는 일정</div>
      </div>
      <div id="upcoming-list"></div>
    </div>
  </div>

  <div id="timetable-page" class="page">
    <div class="section-title">📚 내 시간표</div>
    <div id="timetable-wrap">
      <div class="timetable" id="timetable-grid"></div>
    </div>

    <div class="section-title">➕ 수업 추가</div>
    <div class="form-card">
      <div class="form-row">
        <label class="form-label">과목명</label>
        <input type="text" class="form-input" id="class-name" placeholder="예: 디지털 인문학" />
      </div>
      <div class="form-row">
        <label class="form-label">교수명 (선택)</label>
        <input type="text" class="form-input" id="class-prof" placeholder="예: 이승은" />
      </div>
      <div class="form-row">
        <label class="form-label">요일</label>
        <div class="day-pick" id="class-day-pick">
          <button class="day-pick-btn" data-day="1">월</button>
          <button class="day-pick-btn" data-day="2">화</button>
          <button class="day-pick-btn" data-day="3">수</button>
          <button class="day-pick-btn" data-day="4">목</button>
          <button class="day-pick-btn" data-day="5">금</button>
          <button class="day-pick-btn" data-day="6">토</button>
          <button class="day-pick-btn" data-day="0">일</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">교시 (여러 개 가능)</label>
        <div class="period-pick" id="class-period-pick"></div>
      </div>
      <div class="form-row">
        <label class="form-label">강의실 (선택)</label>
        <input type="text" class="form-input" id="class-room" placeholder="예: 백주년기념관 302호" />
      </div>
      <button class="btn btn-primary btn-full" id="add-class-btn">시간표에 추가</button>
    </div>

    <div class="section-title">📋 등록된 수업</div>
    <div id="class-list"></div>
  </div>

  <div id="parttime-page" class="page">
    <div class="section-title">💼 알바 일정 추가</div>
    <div class="form-card">
      <div class="form-row">
        <label class="form-label">알바명</label>
        <input type="text" class="form-input" id="part-name" placeholder="예: 카페 알바" />
      </div>
      <div class="form-row">
        <label class="form-label">요일 (여러 개 가능)</label>
        <div class="day-pick" id="part-day-pick">
          <button class="day-pick-btn" data-day="1">월</button>
          <button class="day-pick-btn" data-day="2">화</button>
          <button class="day-pick-btn" data-day="3">수</button>
          <button class="day-pick-btn" data-day="4">목</button>
          <button class="day-pick-btn" data-day="5">금</button>
          <button class="day-pick-btn" data-day="6">토</button>
          <button class="day-pick-btn" data-day="0">일</button>
        </div>
      </div>
      <div class="form-row form-grid-2">
        <div>
          <label class="form-label">시작 시간</label>
          <input type="time" class="form-input" id="part-start" value="18:00" />
        </div>
        <div>
          <label class="form-label">종료 시간</label>
          <input type="time" class="form-input" id="part-end" value="22:00" />
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">장소 (선택)</label>
        <input type="text" class="form-input" id="part-place" placeholder="예: 안암역 스타벅스" />
      </div>
      <button class="btn btn-primary btn-full" id="add-part-btn">알바 일정 추가</button>
    </div>

    <div class="section-title">📋 등록된 알바</div>
    <div id="part-list"></div>
  </div>

  <div id="calendar-page" class="page">
    <div id="cal-nav">
      <button id="cal-prev">‹</button>
      <div id="cal-month"></div>
      <button id="cal-next">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-week-header">
        <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div id="cal-day-detail">
      <div id="cal-detail-title">날짜를 선택하세요</div>
      <div id="cal-detail-list"></div>
    </div>
  </div>

  <div id="freetime-page" class="page">
    <div class="section-title">🕊 평일 빈 교시 찾기</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">
      수업과 알바 일정이 없는 빈 교시(1~10교시)를 요일별로 찾아드려요.
    </div>
    <div id="free-list"></div>
  </div>

</main>

<button id="fab" title="약속 추가">＋</button>
<div id="toast"></div>

<div id="modal-bg">
  <div id="modal">
    <div id="modal-title">📌 새 약속 추가</div>
    <div class="form-row">
      <label class="form-label">일정 제목</label>
      <input type="text" class="form-input" id="event-title" placeholder="예: 친구랑 점심" />
    </div>
    <div class="form-row form-grid-2">
      <div>
        <label class="form-label">날짜</label>
        <input type="date" class="form-input" id="event-date" />
      </div>
      <div>
        <label class="form-label">장소 (선택)</label>
        <input type="text" class="form-input" id="event-place" placeholder="장소" />
      </div>
    </div>
    <div class="form-row form-grid-2">
      <div>
        <label class="form-label">시작</label>
        <input type="time" class="form-input" id="event-start" value="12:00" />
      </div>
      <div>
        <label class="form-label">종료</label>
        <input type="time" class="form-input" id="event-end" value="13:00" />
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">메모 (선택)</label>
      <textarea class="form-textarea" id="event-memo" placeholder="간단한 메모"></textarea>
    </div>
    <button class="btn btn-primary btn-full" id="save-event-btn">저장</button>
    <button class="btn btn-ghost btn-full" id="cancel-event-btn" style="margin-top:8px">취소</button>
  </div>
</div>

<script>
// ── 상수 (0:일, 1:월, ... 6:토 표준 일치) ──
const DAYS_KOR = ['일','월','화','수','목','금','토'];
const PERIODS = [
  { num:1, start:'09:00', end:'09:50' },
  { num:2, start:'10:00', end:'10:50' },
  { num:3, start:'11:00', end:'11:50' },
  { num:4, start:'12:00', end:'12:50' },
  { num:5, start:'13:00', end:'13:50' },
  { num:6, start:'14:00', end:'14:50' },
  { num:7, start:'15:00', end:'15:50' },
  { num:8, start:'16:00', end:'16:50' },
  { num:9, start:'17:00', end:'17:50' },
  { num:10, start:'18:00', end:'18:50' },
];

// ── 스토리지 ──
function getClasses() { return JSON.parse(localStorage.getItem('ts_classes')||'[]'); }
function saveClasses(d) { localStorage.setItem('ts_classes', JSON.stringify(d)); }
function getParts() { return JSON.parse(localStorage.getItem('ts_parts')||'[]'); }
function saveParts(d) { localStorage.setItem('ts_parts', JSON.stringify(d)); }
function getEvents() { return JSON.parse(localStorage.getItem('ts_events')||'[]'); }
function saveEvents(d) { localStorage.setItem('ts_events', JSON.stringify(d)); }

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── 탭 전환 ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + '-page').classList.add('active');
    renderAll();
  };
});

// ── 토스트 ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── 교시 및 요일 세팅 ──
const periodPick = document.getElementById('class-period-pick');
PERIODS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'period-pick-btn';
  btn.dataset.period = p.num;
  btn.textContent = p.num + '교시';
  btn.onclick = (e) => { e.preventDefault(); btn.classList.toggle('selected'); };
  periodPick.appendChild(btn);
});

document.querySelectorAll('#class-day-pick .day-pick-btn').forEach(btn => {
  btn.onclick = (e) => {
    e.preventDefault();
    document.querySelectorAll('#class-day-pick .day-pick-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };
});

document.querySelectorAll('#part-day-pick .day-pick-btn').forEach(btn => {
  btn.onclick = (e) => { e.preventDefault(); btn.classList.toggle('selected'); };
});

// ── 수업 추가 ──
document.getElementById('add-class-btn').onclick = () => {
  const name = document.getElementById('class-name').value.trim();
  const prof = document.getElementById('class-prof').value.trim();
  const room = document.getElementById('class-room').value.trim();
  const daySel = document.querySelector('#class-day-pick .day-pick-btn.selected');
  const periodSel = [...document.querySelectorAll('#class-period-pick .period-pick-btn.selected')].map(b => parseInt(b.dataset.period));
  
  if (!name) { toast('과목명을 입력해 주세요'); return; }
  if (!daySel) { toast('요일을 선택해 주세요'); return; }
  if (!periodSel.length) { toast('교시를 선택해 주세요'); return; }
  
  const all = getClasses();
  all.push({ id: Date.now().toString(), name, prof, room, day: parseInt(daySel.dataset.day), periods: periodSel });
  saveClasses(all);
  toast('수업 추가 완료!');
  
  document.getElementById('class-name').value = '';
  document.getElementById('class-prof').value = '';
  document.getElementById('class-room').value = '';
  document.querySelectorAll('#class-day-pick .day-pick-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('#class-period-pick .period-pick-btn').forEach(b => b.classList.remove('selected'));
  renderAll();
};

// ── 알바 추가 ──
document.getElementById('add-part-btn').onclick = () => {
  const name = document.getElementById('part-name').value.trim();
  const place = document.getElementById('part-place').value.trim();
  const start = document.getElementById('part-start').value;
  const end = document.getElementById('part-end').value;
  const daySel = [...document.querySelectorAll('#part-day-pick .day-pick-btn.selected')].map(b => parseInt(b.dataset.day));
  
  if (!name) { toast('알바명을 입력해 주세요'); return; }
  if (!daySel.length) { toast('요일을 선택해 주세요'); return; }
  if (!start || !end) { toast('시간을 입력해 주세요'); return; }
  
  const all = getParts();
  all.push({ id: Date.now().toString(), name, place, days, start, end });
  saveParts(all);
  toast('알바 일정 추가 완료!');
  
  document.getElementById('part-name').value = '';
  document.getElementById('part-place').value = '';
  document.querySelectorAll('#part-day-pick .day-pick-btn').forEach(b => b.classList.remove('selected'));
  renderAll();
};

// ── 모달 제어 ──
const modalBg = document.getElementById('modal-bg');
document.getElementById('fab').onclick = () => {
  const today = new Date();
  document.getElementById('event-date').value = dateKey(today);
  modalBg.classList.add('show');
};
document.getElementById('cancel-event-btn').onclick = () => modalBg.classList.remove('show');

// ── 약속 저장 ──
document.getElementById('save-event-btn').onclick = () => {
  const title = document.getElementById('event-title').value.trim();
  const date = document.getElementById('event-date').value;
  const place = document.getElementById('event-place').value.trim();
  const start = document.getElementById('event-start').value;
  const end = document.getElementById('event-end').value;
  const memo = document.getElementById('event-memo').value.trim();
  
  if (!title) { toast('일정 제목을 입력해 주세요'); return; }
  if (!date) { toast('날짜를 선택해 주세요'); return; }
  
  const all = getEvents();
  all.push({ id: Date.now().toString(), title, date, place, start, end, memo });
  saveEvents(all);
  
  modalBg.classList.remove('show');
  toast('약속이 저장되었습니다!');
  
  document.getElementById('event-title').value = '';
  document.getElementById('event-place').value = '';
  document.getElementById('event-memo').value = '';
  renderAll();
};

// ── 캘린더 변수 및 네비게이션 ──
let currDate = new Date();
document.getElementById('cal-prev').onclick = () => { currDate.setMonth(currDate.getMonth() - 1); renderAll(); };
document.getElementById('cal-next').onclick = () => { currDate.setMonth(currDate.getMonth() + 1); renderAll(); };
let selectedDateStr = dateKey(new Date());

// ── 삭제 함수 ──
function delItem(type, id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  if (type === 'class') { saveClasses(getClasses().filter(x => x.id !== id)); }
  if (type === 'part') { saveParts(getParts().filter(x => x.id !== id)); }
  if (type === 'event') { saveEvents(getEvents().filter(x => x.id !== id)); }
  toast('삭제되었습니다.');
  renderAll();
}

// ── 핵심 렌더링 함수 ──
function renderAll() {
  const classes = getClasses();
  const parts = getParts();
  const events = getEvents();
  const today = new Date();
  const tDay = today.getDay(); // 0:일~6:토
  
  // 1. 대시보드 스탯 업데이트
  document.getElementById('stat-classes').textContent = classes.length;
  document.getElementById('stat-part').textContent = parts.length;
  
  const activeEvents = events.filter(e => new Date(e.date) >= new Date().setHours(0,0,0,0));
  document.getElementById('stat-events').textContent = activeEvents.length;
  
  // 오늘 공강 교시 계산
  const todayClasses = classes.filter(c => c.day === tDay);
  const usedPeriods = new Set();
  todayClasses.forEach(c => c.periods.forEach(p => usedPeriods.add(p)));
  document.getElementById('stat-free').textContent = Math.max(0, 10 - usedPeriods.size);
  
  document.getElementById('today-date').textContent = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${DAYS_KOR[tDay]})`;

  // 2. 오늘의 일정 목록
  const todayList = document.getElementById('today-list');
  todayList.innerHTML = '';
  let todayItems = [];
  
  classes.filter(c => c.day === tDay).forEach(c => {
    const minP = Math.min(...c.periods);
    const maxP = Math.max(...c.periods);
    todayItems.push({
      time: PERIODS[minP-1].start,
      type: 'class',
      name: c.name,
      meta: `${minP}~${maxP}교시 ${c.room ? '• ' + c.room : ''}`,
      rawTime: PERIODS[minP-1].start
    });
  });
  
  parts.filter(p => p.days.includes(tDay)).forEach(p => {
    todayItems.push({ time: p.start, type: 'part', name: p.name, meta: p.place || '장소 미지정', rawTime: p.start });
  });
  
  events.filter(e => e.date === dateKey(today)).forEach(e => {
    todayItems.push({ time: e.start, type: 'event', name: e.title, meta: e.place || '장소 미지정', rawTime: e.start });
  });
  
  todayItems.sort((a,b) => a.rawTime.localeCompare(b.rawTime));
  
  if (todayItems.length === 0) {
    todayList.innerHTML = '<div class="empty">오늘 예정된 일정이 없습니다. 공강을 즐기세요! 😎</div>';
  } else {
    todayItems.forEach(item => {
      todayList.innerHTML += `
        <div class="today-item ${item.type}">
          <div class="today-item-time">${item.time}</div>
          <div class="today-item-tag"></div>
          <div class="today-item-info">
            <div class="today-item-name">${item.name}</div>
            <div class="today-item-meta">${item.meta}</div>
          </div>
        </div>`;
    });
  }

  // 3. 다가오는 일정 (3개까지만)
  const upcomingList = document.getElementById('upcoming-list');
  upcomingList.innerHTML = '';
  const upEvents = events
    .filter(e => e.date >= dateKey(today))
    .sort((a,b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start))
    .slice(0, 3);
    
  if (upEvents.length === 0) {
    upcomingList.innerHTML = '<div class="empty">다가오는 약속이 없습니다.</div>';
  } else {
    upEvents.forEach(e => {
      const d = new Date(e.date);
      upcomingList.innerHTML += `
        <div class="today-item event">
          <div class="today-item-time" style="font-size:11px; min-width:65px;">${d.getMonth()+1}/${d.getDate()}(${DAYS_KOR[d.getDay()]})</div>
          <div class="today-item-tag"></div>
          <div class="today-item-info">
            <div class="today-item-name">${e.title}</div>
            <div class="today-item-meta">${e.start} ${e.place ? '• ' + e.place : ''}</div>
          </div>
        </div>`;
    });
  }

  // 4. 시간표 그리기
  const grid = document.getElementById('timetable-grid');
  grid.innerHTML = '';
  
  // 헤더 영역 생성
  grid.appendChild(createCell('교시', 'tt-header tt-time'));
  for (let d = 1; d <= 5; d++) grid.appendChild(createCell(DAYS_KOR[d], 'tt-header'));
  
  // 교시별 셀 배치
  PERIODS.forEach(p => {
    grid.appendChild(createCell(`${p.num}<br><span style="font-size:8px;color:var(--text3)">${p.start}</span>`, 'tt-time'));
    for (let d = 1; d <= 5; d++) {
      const matchClass = classes.find(c => c.day === d && c.periods.includes(p.num));
      const matchPart = parts.find(pt => pt.days.includes(d) && isPeriodOverlapping(p.num, pt.start, pt.end));
      
      if (matchClass) {
        grid.appendChild(createCell(`<strong>${matchClass.name}</strong><small>${matchClass.room || ''}</small>`, 'has-class'));
      } else if (matchPart) {
        grid.appendChild(createCell(`<strong>${matchPart.name}</strong><small>알바</small>`, 'has-part'));
      } else {
        grid.appendChild(createCell('', ''));
      }
    }
  });

  // 5. 등록된 관리 리스트 출력 (수업/알바)
  const classList = document.getElementById('class-list');
  classList.innerHTML = classes.length ? '' : '<div class="empty">등록된 수업이 없습니다.</div>';
  classes.forEach(c => {
    classList.innerHTML += `
      <div class="item-card">
        <div class="item-tag class"></div>
        <div class="item-info">
          <div class="item-name">${c.name}</div>
          <div class="item-meta">${DAYS_KOR[c.day]}요일 ${c.periods.join(', ')}교시 ${c.prof ? '• ' + c.prof : ''} ${c.room ? '• ' + c.room : ''}</div>
        </div>
        <button class="item-del" onclick="delItem('class','${c.id}')">✕</button>
      </div>`;
  });

  const partList = document.getElementById('part-list');
  partList.innerHTML = parts.length ? '' : '<div class="empty">등록된 알바 일정이 없습니다.</div>';
  parts.forEach(p => {
    const daysStr = p.days.map(d => DAYS_KOR[d]).join(', ');
    partList.innerHTML += `
      <div class="item-card">
        <div class="item-tag part"></div>
        <div class="item-info">
          <div class="item-name">${p.name}</div>
          <div class="item-meta">${daysStr} ${p.start}~${p.end} ${p.place ? '• ' + p.place : ''}</div>
        </div>
        <button class="item-del" onclick="delItem('part','${p.id}')">✕</button>
      </div>`;
  });

  // 6. 달력(캘린더) 렌더링
  renderCalendar(classes, parts, events);

  // 7. 평일 빈 시간 매칭
  renderFreeTime(classes, parts);
}

function createCell(html, className) {
  const el = document.createElement('div');
  el.className = `tt-cell ${className}`;
  el.innerHTML = html;
  return el;
}

function isPeriodOverlapping(pNum, startStr, endStr) {
  const p = PERIODS[pNum-1];
  return (startStr < p.end && endStr > p.start);
}

// ── 달력 그리기 상세 ──
function renderCalendar(classes, parts, events) {
  const monthEl = document.getElementById('cal-month');
  const daysContainer = document.getElementById('cal-days');
  daysContainer.innerHTML = '';
  
  const y = currDate.getFullYear();
  const m = currDate.getMonth();
  monthEl.textContent = `${y}년 ${m + 1}월`;
  
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();
  const prevLastDate = new Date(y, m, 0).getDate();
  
  // 지난달 빈칸 채우기
  for (let i = firstDay; i > 0; i--) {
    const d = prevLastDate - i + 1;
    daysContainer.appendChild(createDayCell(y, m - 1, d, true, classes, parts, events));
  }
  // 이번달 채우기
  for (let d = 1; d <= lastDate; d++) {
    daysContainer.appendChild(createDayCell(y, m, d, false, classes, parts, events));
  }
  // 다음달 빈칸 채우기
  const totalCells = firstDay + lastDate;
  const nextCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= nextCells; d++) {
    daysContainer.appendChild(createDayCell(y, m + 1, d, true, classes, parts, events));
  }
  
  renderCalDetail();
}

function createDayCell(y, m, d, isOther, classes, parts, events) {
  const dateObj = new Date(y, m, d);
  const key = dateKey(dateObj);
  const dayOfWeek = dateObj.getDay();
  
  const cell = document.createElement('div');
  cell.className = 'cal-day';
  if (isOther) cell.classList.add('other-month');
  
  if (key === dateKey(new Date())) cell.classList.add('today');
  if (key === selectedDateStr) cell.classList.add('selected');
  
  cell.innerHTML = `<div class="cal-day-num">${d}</div>`;
  
  // 도트 표시기 설정
  const dotsContainer = document.createElement('div');
  dotsContainer.className = 'cal-day-dots';
  
  let hasClass = classes.some(c => c.day === dayOfWeek) && !isOther;
  let hasPart = parts.some(p => p.days.includes(dayOfWeek)) && !isOther;
  let hasEvent = events.some(e => e.date === key);
  
  if (hasClass) dotsContainer.innerHTML += '<div class="cal-dot class"></div>';
  if (hasPart) dotsContainer.innerHTML += '<div class="cal-dot part"></div>';
  if (hasEvent) dotsContainer.innerHTML += '<div class="cal-dot event"></div>';
  
  cell.appendChild(dotsContainer);
  
  cell.onclick = () => {
    selectedDateStr = key;
    document.querySelectorAll('.cal-day').forEach(c => c.classList.remove('selected'));
    cell.classList.add('selected');
    renderCalDetail();
  };
  
  return cell;
}

function renderCalDetail() {
  const dObj = new Date(selectedDateStr);
  const dayOfWeek = dObj.getDay();
  document.getElementById('cal-detail-title').textContent = `${dObj.getMonth()+1}월 ${dObj.getDate()}일 (${DAYS_KOR[dayOfWeek]}) 일정`;
  
  const list = document.getElementById('cal-detail-list');
  list.innerHTML = '';
  
  let items = [];
  getClasses().filter(c => c.day === dayOfWeek).forEach(c => {
    items.push({ type:'class', title: c.name, time: `${Math.min(...c.periods)}~${Math.max(...c.periods)}교시`, meta: c.room });
  });
  getParts().filter(p => p.days.includes(dayOfWeek)).forEach(p => {
    items.push({ type:'part', title: p.name, time: `${p.start}~${p.end}`, meta: p.place });
  });
  getEvents().filter(e => e.date === selectedDateStr).forEach(e => {
    items.push({ type:'event', title: e.title, time: `${e.start}~${e.end}`, meta: e.place, id: e.id });
  });
  
  if(items.length === 0) {
    list.innerHTML = '<div class="empty" style="padding:10px 0">일정이 없습니다.</div>';
  } else {
    items.forEach(item => {
      let delBtn = item.type === 'event' ? `<button class="item-del" onclick="event.stopPropagation(); delItem('event','${item.id}')" style="font-size:14px;padding:2px 6px">✕</button>` : '';
      list.innerHTML += `
        <div class="today-item ${item.type}" style="margin-bottom:4px; padding:8px;">
          <div class="today-item-time" style="font-size:12px; min-width:70px">${item.time}</div>
          <div class="today-item-tag"></div>
          <div class="today-item-info">
            <div class="today-item-name" style="font-size:13px">${item.title}</div>
            <div class="today-item-meta" style="font-size:10px">${item.meta || ''}</div>
          </div>
          ${delBtn}
        </div>`;
    });
  }
}

// ── 빈 시간 계산 ──
function renderFreeTime(classes, parts) {
  const container = document.getElementById('free-list');
  container.innerHTML = '';
  
  for (let d = 1; d <= 5; d++) {
    let busyPeriods = new Set();
    
    classes.filter(c => c.day === d).forEach(c => c.periods.forEach(p => busyPeriods.add(p)));
    parts.filter(pt => pt.days.includes(d)).forEach(pt => {
      PERIODS.forEach(p => {
        if (isPeriodOverlapping(p.num, pt.start, pt.end)) busyPeriods.add(p.num);
      });
    });
    
    let freeSlots = [];
    PERIODS.forEach(p => {
      if (!busyPeriods.has(p.num)) freeSlots.push(p.num);
    });
    
    let card = document.createElement('div');
    card.className = 'free-day-card';
    
    let title = document.createElement('div');
    title.className = 'free-day-title';
    title.textContent = `${DAYS_KOR[d]}요일`;
    card.appendChild(title);
    
    if (freeSlots.length === 0) {
      card.innerHTML += '<span style="font-size:12px;color:var(--text3)">빈 교시가 없습니다 😭</span>';
    } else {
      freeSlots.forEach(s => {
        card.innerHTML += `<span class="free-slot">${s}교시 (${PERIODS[s-1].start})</span>`;
      });
    }
    container.appendChild(card);
  }
}

// 초기화 가동
renderAll();
</script>
</body>
</html>
